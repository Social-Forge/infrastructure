# Cache DNS
nscache 65536

# Timeout settings
timeouts 1 5 30 60 180 600 60 60

# Logging
log /var/log/3proxy/3proxy.log D
logformat "- +_L%t.%. %N.%p %E %U %C:%c %R:%r %O %I %h %T"
rotate 30

# Users
users infrastructure-admin:CL:NX5hJ3nLRAZ8qRjTsx1VUsIDbchBZ0zG

# Authentication
auth strong

# Access rules
allow admin
# deny * * * * * *  # Uncomment untuk block selain admin

# Services
proxy -p3129 -i0.0.0.0 -e0.0.0.0
socks -p1080 -i0.0.0.0 -e0.0.0.0

# Apply config
flush